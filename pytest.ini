[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: 需要 Flask server 在 localhost:5001 運行（WHISPER_TEST=1）
    e2e: 需要 Playwright + Flask server
    accuracy: 需要參考音檔 + --run-accuracy 旗標

# 預設只跑 unit tests，不需要 server
addopts = -m "not integration and not e2e and not accuracy" -v
