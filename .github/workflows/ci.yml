name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          pip install --no-build-isolation -r requirements.txt
          pip install pytest

      - name: Compile core Python modules
        run: python -m py_compile app.py routes.py whisper_core.py integrations.py llm_post.py sse.py gui.py

      - name: Run unit tests
        run: python -m pytest tests/unit -q
