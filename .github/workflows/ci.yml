name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install --no-build-isolation -r requirements.txt
          pip install pytest

      - name: Compile core Python modules
        run: python -m py_compile app.py routes.py whisper_core.py integrations.py llm_post.py sse.py gui.py

      - name: Run unit tests
        run: python -m pytest tests/unit -q

  integration-tests:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install --no-build-isolation -r requirements.txt
          pip install pytest requests

      - name: Start Flask server (WHISPER_TEST mode)
        run: |
          WHISPER_TEST=1 nohup python3 app.py > server.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:5001/api/health > /dev/null 2>&1; then
              echo "server ready"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready in time"
          cat server.log
          exit 1

      - name: Run integration tests
        run: python -m pytest tests/integration -m integration -v

      - name: Server log (always, for debugging)
        if: always()
        run: cat server.log || true

      - name: Stop Flask server
        if: always()
        run: pkill -f "python3 app.py" || true

  bundle-dependency-check:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install --no-build-isolation -r requirements.txt
          pip install pyinstaller

      - name: Build unsigned bundle (no install, no codesign)
        run: python -m PyInstaller -y gui.spec

      - name: Check bundle does not contain pyannote packaging regression
        run: python3 ci/check_bundle_deps.py
