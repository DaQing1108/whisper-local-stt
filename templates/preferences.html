<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper STT — 偏好設定</title>
  <link rel="stylesheet" href="/static/preferences.css">
</head>
<body>
  <div class="prefs-container">
    <h1 class="prefs-title">偏好設定</h1>

    <!-- Obsidian -->
    <section class="prefs-section">
      <h2>Obsidian 存檔</h2>
      <div class="field">
        <label for="obsidian-path">Vault 路徑</label>
        <div class="input-row">
          <input type="text" id="obsidian-path" placeholder="~/Documents/Obsidian/meetings">
          <button class="btn validate" id="validate-obsidian-btn" onclick="validateObsidian()">驗證</button>
        </div>
        <span class="field-hint">存入的 .md 檔案會放在這個目錄下</span>
        <span class="validate-status" id="obsidian-status"></span>
      </div>
    </section>

    <!-- Notion -->
    <section class="prefs-section">
      <h2>Notion 存檔</h2>
      <div class="field">
        <label for="notion-token">Integration Token</label>
        <input type="password" id="notion-token" placeholder="secret_xxxxxxxxxxxxxxxx" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="notion-page-id">目標頁面 ID</label>
        <div class="input-row">
          <input type="text" id="notion-page-id" placeholder="37a280a95f76810b90d0e6cad40786fa">
          <button class="btn validate" id="validate-notion-btn" onclick="validateNotion()">驗證</button>
        </div>
        <span class="validate-status" id="notion-status"></span>
      </div>
    </section>

    <!-- LLM -->
    <section class="prefs-section">
      <h2>LLM API Key <span class="optional">（選填）</span></h2>
      <div class="field">
        <label for="anthropic-key">Claude API Key <span class="key-status" id="anthropic-status"></span></label>
        <input type="password" id="anthropic-key" placeholder="sk-ant-api03-…" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="openai-key">OpenAI API Key <span class="key-status" id="openai-status"></span></label>
        <input type="password" id="openai-key" placeholder="sk-…" autocomplete="new-password">
      </div>
    </section>

    <!-- Updates -->
    <section class="prefs-section">
      <h2>App 更新</h2>
      <div class="field">
        <div class="input-row">
          <button class="btn validate" id="check-updates-btn" onclick="checkForUpdates()">檢查更新</button>
          <span class="validate-status" id="updates-status"></span>
        </div>
        <span class="field-hint">使用 Sparkle appcast 檢查新版本</span>
      </div>
    </section>

    <div class="prefs-actions">
      <button class="btn primary" onclick="saveAll()">儲存</button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <script src="/static/preferences.js"></script>
</body>
</html>
